services:
  postgres:
    image: postgres:16
    container_name: beacon_postgres
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon_password
      POSTGRES_DB: beacon_db
    ports:
      - "5433:5432"
    volumes:
      - beacon_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: beacon_redis
    ports:
      - "6379:6379"

volumes:
  beacon_postgres_data: